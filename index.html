<!DOCTYPE html>
<html lang="en-IN">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>

    <!-- Preconnect to improve performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Caveat:wght@400;700&family=Newsreader:ital,wght@0,400;0,500;1,400&family=Google+Sans+Flex:wght@100..900&family=Bangers&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- Fontshare -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <!-- App styles & scripts (relative paths) -->
    <script type="module" crossorigin src="assets/index-f92d7118.js"></script>
    <link rel="stylesheet" href="assets/index-b23cb8d8.css">

    <style>
        * {
            cursor: auto !important;
        }

        .cursor,
        .blue-cursor,
        #cursor,
        [class*="cursor"],
        .up-cursor {
            display: none !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- html2canvas - loaded locally from cache -->
    <script src="assets/html2canvas.min.js"></script>

    <!-- LiquidGL - loaded from CDN (required for background effects) -->
    <script>
        // Graceful fallback if liquidgl fails to load
        window.addEventListener('error', function (e) {
            if (e.filename && e.filename.includes('liquidgl')) {
                console.warn('LiquidGL failed to load - some background effects may not appear.');
            }
        }, true);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/liquidgl"
        onerror="console.warn('LiquidGL not available - background effects disabled.')"></script>

    <!-- Irfan's portfolio content patch: replaces text, images, removes camera section -->
    <script src="assets/portfolio-patch.js" defer></script>
</body>

</html>
